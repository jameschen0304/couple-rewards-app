# 使用说明见仓库根目录 SYNC_SETUP.md「免费云端托管」
# 首次部署：在 server-proxy 目录执行 fly launch（需安装 https://fly.io/docs/hands-on/install-flyctl/）

app = "couple-rewards-sync-proxy"
primary_region = "hkg"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

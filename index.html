<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1a1523" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <title>我们的小账本 · 积分与兑换</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0c14;
      --surface: #1a1523;
      --surface2: #241d32;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f0fa;
      --muted: #9b8fb0;
      --accent-good: #7ee787;
      --accent-good-dim: rgba(126, 231, 135, 0.15);
      --accent-bad: #ff8b8b;
      --accent-bad-dim: rgba(255, 139, 139, 0.12);
      --accent-gold: #f5d07a;
      --accent-gold-dim: rgba(245, 208, 122, 0.18);
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      --font: "Noto Sans SC", "DM Sans", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(126, 231, 135, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 100% 50%, rgba(245, 208, 122, 0.06), transparent),
        radial-gradient(ellipse 50% 30% at 0% 80%, rgba(255, 139, 139, 0.06), transparent);
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 440px;
      margin: 0 auto;
      padding: 20px 18px 100px;
    }

    header {
      text-align: center;
      margin-bottom: 22px;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    header p {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .score-card {
      background: linear-gradient(145deg, var(--surface2), var(--surface));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 20px;
      text-align: center;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .score-card .label {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
    }

    .score-card .value {
      font-size: 2.75rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, var(--accent-gold), #fff8e7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .score-card .hint {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 4px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      margin-bottom: 18px;
    }

    .tabs button {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 10px 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }

    .tabs button.active {
      background: var(--surface2);
      color: var(--text);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      flex: 1;
      min-width: 100px;
    }

    .field label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
    }

    .field input:focus {
      outline: none;
      border-color: rgba(245, 208, 122, 0.4);
    }

    .btn {
      border: none;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.2s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-good {
      background: var(--accent-good);
      color: #0a1f0d;
    }

    .btn-bad {
      background: var(--accent-bad);
      color: #2a0a0a;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--accent-gold), #e8c55c);
      color: #2a2210;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-sm {
      padding: 6px 10px;
      font-size: 0.75rem;
    }

    .chip-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s;
    }

    .chip-good {
      background: var(--accent-good-dim);
      border-color: rgba(126, 231, 135, 0.25);
    }

    .chip-bad {
      background: var(--accent-bad-dim);
      border-color: rgba(255, 139, 139, 0.2);
    }

    .chip-gold {
      background: var(--accent-gold-dim);
      border-color: rgba(245, 208, 122, 0.25);
    }

    .chip:hover {
      filter: brightness(1.05);
    }

    .chip-trigger {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      text-align: left;
      font: inherit;
      color: inherit;
    }

    .chip-trigger:disabled {
      cursor: not-allowed;
      filter: grayscale(0.2);
    }

    .chip span.points {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .chip-good span.points { color: var(--accent-good); }
    .chip-bad span.points { color: var(--accent-bad); }
    .chip-gold span.points { color: var(--accent-gold); }

    .chip-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .empty {
      color: var(--muted);
      font-size: 0.88rem;
      padding: 16px;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-item .meta {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 2px;
    }

    .history-item .delta {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .history-item .delta.plus { color: var(--accent-good); }
    .history-item .delta.minus { color: var(--accent-bad); }
    .history-item .delta.redeem { color: var(--accent-gold); }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .help-text {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.45;
      margin: 0 0 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    @media (min-width: 480px) {
      .modal-overlay {
        align-items: center;
      }
      .modal {
        border-radius: var(--radius);
        transform: scale(0.92);
        opacity: 0;
      }
      .modal-overlay.open .modal {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal h3 {
      font-size: 1.05rem;
      margin-bottom: 14px;
    }

    .modal .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .modal .actions .btn {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="app">
    <header>
      <h1>我们的小账本</h1>
      <p>有爱加分 · 伤害扣分 · 积分兑换小奖励</p>
    </header>

    <div class="score-card">
      <div class="label">当前积分</div>
      <div class="value" id="balance">0</div>
      <div class="hint" id="balanceHint">一起积累，一起兑现～</div>
    </div>

    <nav class="tabs" role="tablist" aria-label="功能分区">
      <button type="button" class="active" data-tab="good" role="tab" aria-selected="true">加分</button>
      <button type="button" data-tab="bad" role="tab" aria-selected="false">扣分</button>
      <button type="button" data-tab="redeem" role="tab" aria-selected="false">兑换</button>
      <button type="button" data-tab="history" role="tab" aria-selected="false">记录</button>
    </nav>

    <section id="panel-good" class="panel active" role="tabpanel">
      <div class="section-title">记一件有爱的事</div>
      <div class="card">
        <div class="row">
          <div class="field">
            <label for="goodName">事情描述</label>
            <input id="goodName" type="text" placeholder="例如：主动洗碗、按摩十分钟" maxlength="80" />
          </div>
          <div class="field" style="flex: 0 0 88px; min-width: 88px;">
            <label for="goodPoints">积分</label>
            <input id="goodPoints" type="number" inputmode="numeric" min="1" max="9999" value="5" />
          </div>
        </div>
        <div class="toolbar">
          <button type="button" class="btn btn-good" id="addGoodTemplate">保存为常用项</button>
          <button type="button" class="btn btn-ghost" id="applyGoodOnce">直接加分</button>
        </div>
      </div>
      <div class="section-title">常用加分项（点一下即加分）</div>
      <div class="chip-list" id="goodList"></div>
    </section>

    <section id="panel-bad" class="panel" role="tabpanel" hidden>
      <div class="section-title">记一件需要反省的事</div>
      <div class="card">
        <div class="row">
          <div class="field">
            <label for="badName">事情描述</label>
            <input id="badName" type="text" placeholder="例如：说话冲、忘记约定" maxlength="80" />
          </div>
          <div class="field" style="flex: 0 0 88px; min-width: 88px;">
            <label for="badPoints">扣分</label>
            <input id="badPoints" type="number" inputmode="numeric" min="1" max="9999" value="3" />
          </div>
        </div>
        <div class="toolbar">
          <button type="button" class="btn btn-bad" id="addBadTemplate">保存为常用项</button>
          <button type="button" class="btn btn-ghost" id="applyBadOnce">直接扣分</button>
        </div>
      </div>
      <div class="section-title">常用扣分项（点一下即扣分）</div>
      <div class="chip-list" id="badList"></div>
    </section>

    <section id="panel-redeem" class="panel" role="tabpanel" hidden>
      <div class="section-title">可兑换的奖励</div>
      <div class="card">
        <div class="row">
          <div class="field">
            <label for="rewardName">奖励内容</label>
            <input id="rewardName" type="text" placeholder="例如：一顿想吃的饭、免做家务一天" maxlength="80" />
          </div>
          <div class="field" style="flex: 0 0 88px; min-width: 88px;">
            <label for="rewardCost">所需积分</label>
            <input id="rewardCost" type="number" inputmode="numeric" min="1" max="99999" value="30" />
          </div>
        </div>
        <div class="toolbar">
          <button type="button" class="btn btn-gold" id="addReward">添加兑换项</button>
        </div>
      </div>
      <div class="section-title">点击兑换（会扣除对应积分）</div>
      <div class="chip-list" id="rewardList"></div>
    </section>

    <section id="panel-history" class="panel" role="tabpanel" hidden>
      <div class="section-title">最近记录</div>
      <div class="card" id="historyCard">
        <div id="historyList"></div>
        <div class="toolbar" style="margin-top: 8px;">
          <button type="button" class="btn btn-ghost btn-sm" id="clearHistory">清空记录（保留积分与模板）</button>
        </div>
      </div>
      <div class="section-title" style="margin-top: 22px;">备份与恢复</div>
      <div class="card">
        <p class="help-text">导出 JSON 后自行保存或发给对方；换手机时用「从文件恢复」载入。数据只在本机浏览器，不会上传服务器。</p>
        <div class="toolbar">
          <button type="button" class="btn btn-gold" id="exportData">导出备份</button>
          <button type="button" class="btn btn-ghost" id="triggerImport">从文件恢复</button>
        </div>
        <input type="file" id="importFile" accept="application/json,.json" hidden />
        <div class="toolbar" style="margin-top: 4px;">
          <button type="button" class="btn btn-bad btn-sm" id="resetAll">清空全部数据</button>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <div class="modal-overlay" id="confirmModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <h3 id="confirmTitle">确认操作</h3>
      <p id="confirmBody" style="color: var(--muted); font-size: 0.9rem;"></p>
      <div class="actions">
        <button type="button" class="btn btn-ghost" id="confirmCancel">取消</button>
        <button type="button" class="btn btn-gold" id="confirmOk">确定</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "coupleRewardsApp.v1";

    const defaultState = () => ({
      balance: 0,
      goodTemplates: [
        { id: uid(), name: "主动分担家务", points: 5 },
        { id: uid(), name: "认真倾听、好好沟通", points: 8 },
      ],
      badTemplates: [
        { id: uid(), name: "说话伤人/冷战", points: 5 },
        { id: uid(), name: "忘记重要约定", points: 8 },
      ],
      rewards: [
        { id: uid(), name: "对方请吃一顿想吃的", cost: 40 },
        { id: uid(), name: "按摩 20 分钟", cost: 25 },
      ],
      history: [],
    });

    function uid() {
      return crypto.randomUUID?.() || String(Date.now()) + Math.random().toString(36).slice(2);
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const data = JSON.parse(raw);
        return {
          balance: Number(data.balance) || 0,
          goodTemplates: Array.isArray(data.goodTemplates) ? data.goodTemplates : defaultState().goodTemplates,
          badTemplates: Array.isArray(data.badTemplates) ? data.badTemplates : defaultState().badTemplates,
          rewards: Array.isArray(data.rewards) ? data.rewards : defaultState().rewards,
          history: Array.isArray(data.history) ? data.history : [],
        };
      } catch {
        return defaultState();
      }
    }

    let state = loadState();

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function normalizeImportedPayload(raw) {
      const data =
        raw && typeof raw === "object" && raw.data && typeof raw.data === "object" ? raw.data : raw;
      if (!data || typeof data !== "object") return null;
      const def = defaultState();

      const mapGoodBad = (arr, fallbackPts) => {
        if (!Array.isArray(arr)) return null;
        return arr
          .filter((t) => t && String(t.name).trim())
          .map((t) => ({
            id: t.id || uid(),
            name: String(t.name).trim(),
            points: Math.max(1, Math.min(99999, parseInt(String(t.points), 10) || fallbackPts)),
          }));
      };

      const mapRewards = (arr) => {
        if (!Array.isArray(arr)) return null;
        return arr
          .filter((r) => r && String(r.name).trim())
          .map((r) => ({
            id: r.id || uid(),
            name: String(r.name).trim(),
            cost: Math.max(1, Math.min(99999, parseInt(String(r.cost), 10) || 30)),
          }));
      };

      const mapHistory = (arr) => {
        if (!Array.isArray(arr)) return [];
        return arr
          .filter((h) => h && String(h.title || "").trim())
          .map((h) => {
            const kind =
              h.kind === "good" || h.kind === "bad" || h.kind === "redeem" ? h.kind : "good";
            const base = {
              id: h.id || uid(),
              at: typeof h.at === "string" ? h.at : new Date().toISOString(),
              kind,
              title: String(h.title).trim(),
            };
            if (kind === "redeem") return { ...base, cost: Math.max(0, Number(h.cost) || 0) };
            return { ...base, points: Math.max(1, Number(h.points) || 1) };
          })
          .slice(0, 200);
      };

      return {
        balance: Number(data.balance) || 0,
        goodTemplates: mapGoodBad(data.goodTemplates, 5) ?? def.goodTemplates,
        badTemplates: mapGoodBad(data.badTemplates, 3) ?? def.badTemplates,
        rewards: mapRewards(data.rewards) ?? def.rewards,
        history: mapHistory(data.history),
      };
    }

    const els = {
      balance: document.getElementById("balance"),
      balanceHint: document.getElementById("balanceHint"),
      goodName: document.getElementById("goodName"),
      goodPoints: document.getElementById("goodPoints"),
      badName: document.getElementById("badName"),
      badPoints: document.getElementById("badPoints"),
      rewardName: document.getElementById("rewardName"),
      rewardCost: document.getElementById("rewardCost"),
      goodList: document.getElementById("goodList"),
      badList: document.getElementById("badList"),
      rewardList: document.getElementById("rewardList"),
      historyList: document.getElementById("historyList"),
      toast: document.getElementById("toast"),
      confirmModal: document.getElementById("confirmModal"),
      confirmBody: document.getElementById("confirmBody"),
      confirmOk: document.getElementById("confirmOk"),
      confirmCancel: document.getElementById("confirmCancel"),
    };

    function toast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => els.toast.classList.remove("show"), 2200);
    }

    let confirmResolver = null;
    function confirm(message) {
      return new Promise((resolve) => {
        confirmResolver = resolve;
        els.confirmBody.textContent = message;
        els.confirmModal.classList.add("open");
        els.confirmModal.setAttribute("aria-hidden", "false");
      });
    }

    function closeConfirm(result) {
      els.confirmModal.classList.remove("open");
      els.confirmModal.setAttribute("aria-hidden", "true");
      if (confirmResolver) confirmResolver(result);
      confirmResolver = null;
    }

    els.confirmOk.addEventListener("click", () => closeConfirm(true));
    els.confirmCancel.addEventListener("click", () => closeConfirm(false));
    els.confirmModal.addEventListener("click", (e) => {
      if (e.target === els.confirmModal) closeConfirm(false);
    });

    function formatTime(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      const now = new Date();
      const sameDay =
        d.getFullYear() === now.getFullYear() &&
        d.getMonth() === now.getMonth() &&
        d.getDate() === now.getDate();
      const t = d.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
      if (sameDay) return `今天 ${t}`;
      return d.toLocaleString("zh-CN", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function pushHistory(entry) {
      state.history.unshift({ id: uid(), at: new Date().toISOString(), ...entry });
      if (state.history.length > 200) state.history.length = 200;
    }

    function renderBalance() {
      els.balance.textContent = state.balance;
      const next = state.rewards
        .filter((r) => r.cost > state.balance)
        .sort((a, b) => a.cost - b.cost)[0];
      if (next) {
        const need = next.cost - state.balance;
        els.balanceHint.textContent = `距离「${next.name}」还差 ${need} 分`;
      } else if (state.rewards.length) {
        els.balanceHint.textContent = "当前积分可尝试兑换奖励～";
      } else {
        els.balanceHint.textContent = "先添加一些兑换项吧";
      }
    }

    function renderGoodList() {
      if (!state.goodTemplates.length) {
        els.goodList.innerHTML = '<div class="empty">还没有常用项，填写上方表单后点「保存为常用项」</div>';
        return;
      }
      els.goodList.innerHTML = state.goodTemplates
        .map(
          (t) => `
        <div class="chip chip-good">
          <button type="button" class="chip-trigger" data-action="apply-good" data-id="${t.id}">
            <span style="min-width:0;word-break:break-word;">${escapeHtml(t.name)}</span>
            <span class="points">+${t.points}</span>
          </button>
          <div class="chip-actions">
            <button type="button" class="btn btn-ghost btn-sm" data-action="del-good" data-id="${t.id}">删除</button>
          </div>
        </div>`
        )
        .join("");
    }

    function renderBadList() {
      if (!state.badTemplates.length) {
        els.badList.innerHTML = '<div class="empty">还没有常用扣分项</div>';
        return;
      }
      els.badList.innerHTML = state.badTemplates
        .map(
          (t) => `
        <div class="chip chip-bad">
          <button type="button" class="chip-trigger" data-action="apply-bad" data-id="${t.id}">
            <span style="min-width:0;word-break:break-word;">${escapeHtml(t.name)}</span>
            <span class="points">−${t.points}</span>
          </button>
          <div class="chip-actions">
            <button type="button" class="btn btn-ghost btn-sm" data-action="del-bad" data-id="${t.id}">删除</button>
          </div>
        </div>`
        )
        .join("");
    }

    function renderRewardList() {
      if (!state.rewards.length) {
        els.rewardList.innerHTML = '<div class="empty">添加奖励后，攒够积分即可兑换</div>';
        return;
      }
      els.rewardList.innerHTML = state.rewards
        .map(
          (r) => {
            const ok = state.balance >= r.cost;
            return `
        <div class="chip chip-gold">
          <button type="button" class="chip-trigger" data-action="redeem" data-id="${r.id}" ${ok ? "" : "disabled"} aria-disabled="${ok ? "false" : "true"}">
            <span style="min-width:0;word-break:break-word;">${escapeHtml(r.name)}</span>
            <span class="points">${r.cost} 分</span>
          </button>
          <div class="chip-actions">
            <button type="button" class="btn btn-ghost btn-sm" data-action="del-reward" data-id="${r.id}">删除</button>
          </div>
        </div>`;
          }
        )
        .join("");
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function renderHistory() {
      if (!state.history.length) {
        els.historyList.innerHTML = '<div class="empty">暂无记录</div>';
        return;
      }
      els.historyList.innerHTML = state.history
        .map((h) => {
          let deltaClass = "";
          let deltaText = "";
          if (h.kind === "good") {
            deltaClass = "plus";
            deltaText = `+${h.points}`;
          } else if (h.kind === "bad") {
            deltaClass = "minus";
            deltaText = `−${h.points}`;
          } else {
            deltaClass = "redeem";
            deltaText = `−${h.cost}`;
          }
          return `
          <div class="history-item">
            <div>
              <div>${escapeHtml(h.title)}</div>
              <div class="meta">${formatTime(h.at)}</div>
            </div>
            <div class="delta ${deltaClass}">${deltaText}</div>
          </div>`;
        })
        .join("");
    }

    function renderAll() {
      renderBalance();
      renderGoodList();
      renderBadList();
      renderRewardList();
      renderHistory();
      saveState();
    }

    document.querySelectorAll(".tabs button").forEach((btn) => {
      btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll(".tabs button").forEach((b) => {
          b.classList.toggle("active", b === btn);
          b.setAttribute("aria-selected", b === btn ? "true" : "false");
        });
        document.querySelectorAll(".panel").forEach((p) => {
          const id = "panel-" + tab;
          const on = p.id === id;
          p.classList.toggle("active", on);
          p.hidden = !on;
        });
      });
    });

    function parsePositiveInt(input, fallback) {
      const n = parseInt(String(input).trim(), 10);
      if (!Number.isFinite(n) || n < 1) return fallback;
      return Math.min(n, 99999);
    }

    document.getElementById("addGoodTemplate").addEventListener("click", () => {
      const name = els.goodName.value.trim();
      const points = parsePositiveInt(els.goodPoints.value, 5);
      if (!name) {
        toast("请填写事情描述");
        return;
      }
      state.goodTemplates.push({ id: uid(), name, points });
      els.goodName.value = "";
      toast("已保存常用加分项");
      renderAll();
    });

    document.getElementById("applyGoodOnce").addEventListener("click", () => {
      const name = els.goodName.value.trim();
      const points = parsePositiveInt(els.goodPoints.value, 5);
      if (!name) {
        toast("请填写事情描述");
        return;
      }
      state.balance += points;
      pushHistory({ kind: "good", title: name, points });
      els.goodName.value = "";
      toast(`已加分 +${points}`);
      renderAll();
    });

    document.getElementById("addBadTemplate").addEventListener("click", () => {
      const name = els.badName.value.trim();
      const points = parsePositiveInt(els.badPoints.value, 3);
      if (!name) {
        toast("请填写事情描述");
        return;
      }
      state.badTemplates.push({ id: uid(), name, points });
      els.badName.value = "";
      toast("已保存常用扣分项");
      renderAll();
    });

    document.getElementById("applyBadOnce").addEventListener("click", () => {
      const name = els.badName.value.trim();
      const points = parsePositiveInt(els.badPoints.value, 3);
      if (!name) {
        toast("请填写事情描述");
        return;
      }
      state.balance -= points;
      pushHistory({ kind: "bad", title: name, points });
      els.badName.value = "";
      toast(`已扣分 −${points}`);
      renderAll();
    });

    document.getElementById("addReward").addEventListener("click", () => {
      const name = els.rewardName.value.trim();
      const cost = parsePositiveInt(els.rewardCost.value, 30);
      if (!name) {
        toast("请填写奖励内容");
        return;
      }
      state.rewards.push({ id: uid(), name, cost });
      els.rewardName.value = "";
      toast("已添加兑换项");
      renderAll();
    });

    document.getElementById("goodList").addEventListener("click", (e) => {
      const t = e.target.closest("[data-action]");
      if (!t) return;
      const id = t.dataset.id;
      if (t.dataset.action === "apply-good") {
        const item = state.goodTemplates.find((x) => x.id === id);
        if (!item) return;
        state.balance += item.points;
        pushHistory({ kind: "good", title: item.name, points: item.points });
        toast(`+${item.points} ${item.name}`);
        renderAll();
      }
      if (t.dataset.action === "del-good") {
        state.goodTemplates = state.goodTemplates.filter((x) => x.id !== id);
        renderAll();
      }
    });

    document.getElementById("badList").addEventListener("click", (e) => {
      const t = e.target.closest("[data-action]");
      if (!t) return;
      const id = t.dataset.id;
      if (t.dataset.action === "apply-bad") {
        const item = state.badTemplates.find((x) => x.id === id);
        if (!item) return;
        state.balance -= item.points;
        pushHistory({ kind: "bad", title: item.name, points: item.points });
        toast(`−${item.points} ${item.name}`);
        renderAll();
      }
      if (t.dataset.action === "del-bad") {
        state.badTemplates = state.badTemplates.filter((x) => x.id !== id);
        renderAll();
      }
    });

    document.getElementById("rewardList").addEventListener("click", async (e) => {
      const t = e.target.closest("[data-action]");
      if (!t) return;
      const id = t.dataset.id;
      if (t.dataset.action === "redeem") {
        const item = state.rewards.find((x) => x.id === id);
        if (!item || state.balance < item.cost) return;
        const ok = await confirm(`确定用 ${item.cost} 分兑换「${item.name}」吗？`);
        if (!ok) return;
        state.balance -= item.cost;
        pushHistory({ kind: "redeem", title: `兑换：${item.name}`, cost: item.cost });
        toast("兑换成功，记得兑现哦～");
        renderAll();
      }
      if (t.dataset.action === "del-reward") {
        state.rewards = state.rewards.filter((x) => x.id !== id);
        renderAll();
      }
    });

    document.getElementById("clearHistory").addEventListener("click", async () => {
      const ok = await confirm("清空所有历史记录？当前积分与模板不会变。");
      if (!ok) return;
      state.history = [];
      toast("已清空记录");
      renderAll();
    });

    document.getElementById("exportData").addEventListener("click", () => {
      const payload = {
        version: 1,
        exportedAt: new Date().toISOString(),
        data: {
          balance: state.balance,
          goodTemplates: state.goodTemplates,
          badTemplates: state.badTemplates,
          rewards: state.rewards,
          history: state.history,
        },
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      const day = new Date().toISOString().slice(0, 10);
      a.href = URL.createObjectURL(blob);
      a.download = `couple-rewards-backup-${day}.json`;
      a.rel = "noopener";
      a.click();
      URL.revokeObjectURL(a.href);
      toast("已导出备份");
    });

    document.getElementById("triggerImport").addEventListener("click", () => {
      document.getElementById("importFile").click();
    });

    document.getElementById("importFile").addEventListener("change", async (e) => {
      const input = e.target;
      const file = input.files && input.files[0];
      input.value = "";
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const next = normalizeImportedPayload(parsed);
        if (!next) {
          toast("文件格式不对");
          return;
        }
        const ok = await confirm("用备份覆盖当前积分、模板、奖励与历史记录？此操作不可撤销。");
        if (!ok) return;
        state = next;
        toast("已从备份恢复");
        renderAll();
      } catch {
        toast("无法读取该文件");
      }
    });

    document.getElementById("resetAll").addEventListener("click", async () => {
      const ok = await confirm("将删除积分、模板、奖励与记录，恢复到初始示例数据。确定？");
      if (!ok) return;
      state = defaultState();
      toast("已恢复初始状态");
      renderAll();
    });

    if ("serviceWorker" in navigator) {
      const { protocol, hostname } = location;
      const local =
        hostname === "localhost" || hostname === "127.0.0.1" || hostname === "[::1]";
      if (protocol === "https:" || local) {
        navigator.serviceWorker.register("./sw.js", { scope: "./" }).catch(() => {});
      }
    }

    renderAll();
  </script>
</body>
</html>

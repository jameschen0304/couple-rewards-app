<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#ffe8f2" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <title>我们的小账本 · 积分与兑换</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fff7fa;
      --bg-bloom: #ffe8f2;
      --surface: #ffffff;
      --surface2: #fffbfd;
      --surface3: #fff5f9;
      --border: rgba(240, 170, 200, 0.55);
      --border-soft: rgba(240, 170, 200, 0.28);
      --border-glow: rgba(255, 120, 170, 0.55);
      --text: #5c3d4f;
      --muted: #9b7a8c;
      --accent-good: #ff6b9d;
      --accent-good-dim: rgba(255, 107, 157, 0.11);
      --accent-bad: #b8a0cf;
      --accent-bad-dim: rgba(184, 160, 207, 0.15);
      --accent-gold: #ff9f6b;
      --accent-gold-dim: rgba(255, 159, 107, 0.16);
      --radius: 24px;
      --radius-sm: 18px;
      --radius-xs: 14px;
      --shadow-card: 0 10px 40px rgba(255, 140, 180, 0.14), 0 2px 12px rgba(92, 61, 79, 0.05);
      --shadow-float: 0 24px 56px rgba(255, 130, 170, 0.2), 0 8px 20px rgba(92, 61, 79, 0.08);
      --ease: cubic-bezier(0.34, 1.15, 0.64, 1);
      --font: "Noto Sans SC", "Nunito", system-ui, sans-serif;
      --font-num: "Nunito", "Noto Sans SC", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.6;
      -webkit-tap-highlight-color: transparent;
    }

    ::selection {
      background: rgba(255, 140, 190, 0.28);
      color: var(--text);
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 85% 60% at 90% -5%, rgba(255, 200, 220, 0.45), transparent 50%),
        radial-gradient(ellipse 70% 50% at -5% 30%, rgba(230, 210, 255, 0.35), transparent 45%),
        radial-gradient(ellipse 55% 40% at 50% 100%, rgba(255, 235, 245, 0.9), transparent 55%),
        linear-gradient(180deg, #fff9fc 0%, var(--bg) 45%, var(--bg-bloom) 100%);
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 400px;
      margin: 0 auto;
      padding: max(22px, env(safe-area-inset-top)) 20px max(28px, calc(env(safe-area-inset-bottom) + 88px));
    }

    .header-deco {
      font-size: 1.35rem;
      line-height: 1;
      margin-bottom: 6px;
      opacity: 0.45;
      filter: drop-shadow(0 2px 8px rgba(255, 120, 160, 0.35));
      user-select: none;
    }

    header {
      text-align: center;
      margin-bottom: 22px;
      padding-top: 2px;
    }

    header h1 {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      background: linear-gradient(120deg, #e84a7f 0%, #ff8fb8 40%, #ffa9c8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      font-size: 0.8125rem;
      font-weight: 500;
      line-height: 1.55;
      max-width: 300px;
      margin: 0 auto;
    }

    .score-card {
      position: relative;
      background: linear-gradient(165deg, #ffffff 0%, var(--surface3) 100%);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      padding: 22px 18px 20px;
      text-align: center;
      box-shadow: var(--shadow-card);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .score-card::after {
      content: "";
      position: absolute;
      top: -40%;
      right: -20%;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(255, 180, 210, 0.35) 0%, transparent 70%);
      pointer-events: none;
    }

    .score-card .label {
      position: relative;
      z-index: 1;
      color: var(--muted);
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .score-card .hint {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.55;
      padding: 0 4px;
    }

    .score-dual {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .score-mini {
      position: relative;
      background: linear-gradient(145deg, #fff5f9, #ffffff);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      padding: 16px 10px 14px;
      text-align: center;
      transition: box-shadow 0.25s var(--ease), transform 0.25s var(--ease);
    }

    .score-mini:last-child {
      background: linear-gradient(145deg, #faf6ff, #ffffff);
    }

    .score-mini .mini-label {
      color: var(--muted);
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .score-mini .mini-value {
      font-family: var(--font-num);
      font-size: 1.85rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
      background: linear-gradient(180deg, #e84a7f 0%, #ff8fb8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .names-row {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding-top: 8px;
      border-top: 1px dashed var(--border-soft);
      margin-top: 4px;
    }

    .names-row .field label {
      font-size: 0.65rem;
      letter-spacing: 0.06em;
    }

    .names-row .field input {
      font-size: 0.875rem;
    }

    .person-picker {
      display: flex;
      gap: 0;
      padding: 5px;
      margin-bottom: 8px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-soft);
      box-shadow: 0 4px 20px rgba(255, 140, 180, 0.08);
    }

    .person-picker button {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 12px 10px;
      min-height: 46px;
      border-radius: calc(var(--radius-sm) - 6px);
      cursor: pointer;
      transition: color 0.2s var(--ease), background 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }

    .person-picker button.active {
      background: linear-gradient(180deg, #ffffff, #ffe8f2);
      color: var(--text);
      box-shadow: 0 4px 16px rgba(255, 120, 160, 0.18), 0 0 0 1px rgba(255, 140, 180, 0.35);
    }

    .who-hint {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 18px;
      padding: 0 10px;
    }

    .history-item .who-tag {
      display: inline-block;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #d63d72;
      background: rgba(255, 200, 220, 0.45);
      padding: 3px 9px;
      border-radius: 999px;
      margin-right: 8px;
      vertical-align: middle;
      border: 1px solid rgba(255, 140, 180, 0.35);
    }

    .tabs {
      display: flex;
      gap: 5px;
      padding: 6px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-soft);
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(255, 140, 180, 0.07);
    }

    .tabs button {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 11px 4px;
      min-height: 46px;
      border-radius: calc(var(--radius-sm) - 8px);
      cursor: pointer;
      transition: color 0.2s var(--ease), background 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }

    .tabs button.active {
      background: linear-gradient(180deg, #ffffff, #fff0f6);
      color: #c43d6b;
      box-shadow: 0 4px 14px rgba(255, 120, 160, 0.15), 0 0 0 1px rgba(255, 160, 190, 0.4);
    }

    @media (hover: hover) {
      .tabs button:not(.active):hover {
        color: var(--text);
        background: rgba(255, 240, 248, 0.8);
      }
      .person-picker button:not(.active):hover {
        color: var(--text);
        background: rgba(255, 248, 252, 0.9);
      }
      .chip:not(:has(.chip-trigger:disabled)):hover {
        border-color: rgba(255, 180, 200, 0.65);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(255, 140, 170, 0.12);
      }
      .btn-good:hover,
      .btn-bad:hover,
      .btn-gold:hover {
        filter: brightness(1.04) saturate(1.05);
      }
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
      animation: fadeIn 0.38s var(--ease);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .panel.active { animation: none; }
      .chip:not(:has(.chip-trigger:disabled)):hover { transform: none; }
    }

    .section-title {
      font-size: 0.6875rem;
      font-weight: 700;
      color: #b88aa0;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      padding: 18px 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      flex: 1;
      min-width: 100px;
    }

    .field label {
      display: block;
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .field input {
      width: 100%;
      min-height: 46px;
      padding: 11px 14px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border-soft);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9375rem;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }

    .field input::placeholder {
      color: rgba(155, 122, 140, 0.45);
    }

    .field input:focus {
      outline: none;
      border-color: rgba(255, 140, 180, 0.65);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(255, 180, 210, 0.25);
    }

    .btn {
      border: none;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.875rem;
      padding: 12px 18px;
      min-height: 46px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s var(--ease), filter 0.2s, box-shadow 0.2s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-good {
      background: linear-gradient(135deg, #ff8fb8 0%, #ff6b9d 50%, #ff5088 100%);
      color: #ffffff;
      box-shadow: 0 6px 22px rgba(255, 90, 140, 0.35);
    }

    .btn-bad {
      background: linear-gradient(135deg, #d4c4e8 0%, #b8a0cf 100%);
      color: #ffffff;
      box-shadow: 0 6px 20px rgba(160, 130, 190, 0.25);
    }

    .btn-gold {
      background: linear-gradient(135deg, #ffd4a8 0%, #ff9f6b 45%, #ff8a5c 100%);
      color: #5c3018;
      box-shadow: 0 6px 22px rgba(255, 150, 100, 0.28);
    }

    .btn-ghost {
      background: #ffffff;
      color: var(--text);
      border: 1px solid var(--border-soft);
      box-shadow: 0 2px 12px rgba(92, 61, 79, 0.05);
    }

    .btn-sm {
      padding: 8px 14px;
      min-height: 36px;
      font-size: 0.75rem;
      border-radius: 999px;
    }

    .chip-list {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-soft);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      font-size: 0.9375rem;
      color: var(--text);
      transition: border-color 0.2s var(--ease), background 0.2s var(--ease), transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }

    .chip-good {
      background: linear-gradient(135deg, rgba(255, 240, 248, 0.95), rgba(255, 255, 255, 0.9));
      border-color: rgba(255, 160, 190, 0.4);
      border-left: 4px solid var(--accent-good);
      padding-left: 12px;
    }

    .chip-bad {
      background: linear-gradient(135deg, rgba(248, 244, 255, 0.95), rgba(255, 255, 255, 0.9));
      border-color: rgba(200, 180, 220, 0.45);
      border-left: 4px solid var(--accent-bad);
      padding-left: 12px;
    }

    .chip-gold {
      background: linear-gradient(135deg, rgba(255, 250, 240, 0.95), rgba(255, 255, 255, 0.9));
      border-color: rgba(255, 200, 160, 0.45);
      border-left: 4px solid var(--accent-gold);
      padding-left: 12px;
    }

    .chip-trigger {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      text-align: left;
      font: inherit;
      color: inherit;
    }

    .chip-trigger:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .chip span.points {
      font-family: var(--font-num);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      font-size: 0.875rem;
    }

    .chip-good span.points { color: #e84a7f; }
    .chip-bad span.points { color: #8b6faf; }
    .chip-gold span.points { color: #e87030; }

    .chip-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .empty {
      color: var(--muted);
      font-size: 0.875rem;
      padding: 24px 16px;
      text-align: center;
      border: 2px dashed var(--border-soft);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
    }

    #historyList {
      padding: 4px 0;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 12px;
      margin: 0 -4px;
      border-radius: var(--radius-xs);
      font-size: 0.875rem;
      border-bottom: none;
      transition: background 0.2s var(--ease);
    }

    .history-item:nth-child(even) {
      background: rgba(255, 235, 245, 0.55);
    }

    .history-item .title-line {
      font-weight: 500;
      line-height: 1.5;
    }

    .history-item .meta {
      color: var(--muted);
      font-size: 0.6875rem;
      margin-top: 6px;
      font-weight: 500;
    }

    .history-item .delta {
      font-family: var(--font-num);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      font-size: 0.9375rem;
      padding-top: 2px;
    }

    .history-item .delta.plus { color: #e84a7f; }
    .history-item .delta.minus { color: #8b6faf; }
    .history-item .delta.redeem { color: #e87030; }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .help-text {
      font-size: 0.8125rem;
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 14px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(100px);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--text);
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid rgba(255, 180, 200, 0.5);
      font-size: 0.8125rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: transform 0.4s var(--ease), opacity 0.3s var(--ease);
      max-width: min(90vw, 360px);
      text-align: center;
      box-shadow: var(--shadow-float);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(92, 61, 79, 0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s var(--ease);
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: 100%;
      max-width: 400px;
      background: linear-gradient(180deg, #ffffff 0%, #fff8fc 100%);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 26px 22px 22px;
      transform: translateY(100%);
      transition: transform 0.36s var(--ease);
      box-shadow: var(--shadow-float);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    @media (min-width: 480px) {
      .modal-overlay {
        align-items: center;
        padding-bottom: 16px;
      }
      .modal {
        border-radius: var(--radius);
        transform: scale(0.92) translateY(12px);
        opacity: 0;
      }
      .modal-overlay.open .modal {
        transform: scale(1) translateY(0);
        opacity: 1;
        transition: transform 0.34s var(--ease), opacity 0.28s var(--ease);
      }
    }

    .modal h3 {
      font-size: 1.125rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 0.04em;
      color: #c43d6b;
    }

    .modal .actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .modal .actions .btn {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="app">
    <header>
      <div class="header-deco" aria-hidden="true">♡</div>
      <h1>我们的小账本</h1>
      <p>记录日常小美好 · 攒积分换心动奖励</p>
    </header>

    <div class="score-card">
      <div class="label">两个人的积分罐</div>
      <div class="score-dual">
        <div class="score-mini">
          <div class="mini-label" id="labelHusband">老公</div>
          <div class="mini-value" id="balanceHusband">0</div>
        </div>
        <div class="score-mini">
          <div class="mini-label" id="labelWife">老婆</div>
          <div class="mini-value" id="balanceWife">0</div>
        </div>
      </div>
      <div class="names-row">
        <div class="field">
          <label for="nameHusbandInput">左边这位称呼</label>
          <input id="nameHusbandInput" type="text" maxlength="8" placeholder="老公" />
        </div>
        <div class="field">
          <label for="nameWifeInput">右边这位称呼</label>
          <input id="nameWifeInput" type="text" maxlength="8" placeholder="老婆" />
        </div>
      </div>
      <div class="hint" id="balanceHint">一起成长，兑换属于你们的小惊喜～</div>
    </div>

    <div class="person-picker" role="tablist" aria-label="当前记账对象">
      <button type="button" id="pickHusband" data-person="husband" class="active" role="tab" aria-selected="true">老公</button>
      <button type="button" id="pickWife" data-person="wife" role="tab" aria-selected="false">老婆</button>
    </div>
    <p class="who-hint" id="whoHint">加分、扣分、兑换记在上方选中的人名下，点一下就能切换～</p>

    <nav class="tabs" role="tablist" aria-label="功能分区">
      <button type="button" class="active" data-tab="good" role="tab" aria-selected="true">加分</button>
      <button type="button" data-tab="bad" role="tab" aria-selected="false">扣分</button>
      <button type="button" data-tab="redeem" role="tab" aria-selected="false">兑换</button>
      <button type="button" data-tab="history" role="tab" aria-selected="false">记录</button>
    </nav>

    <section id="panel-good" class="panel active" role="tabpanel">
      <div class="section-title">记一件有爱的事</div>
      <div class="card">
        <div class="row">
          <div class="field">
            <label for="goodName">事情描述</label>
            <input id="goodName" type="text" placeholder="例如：主动洗碗、按摩十分钟" maxlength="80" />
          </div>
          <div class="field" style="flex: 0 0 88px; min-width: 88px;">
            <label for="goodPoints">积分</label>
            <input id="goodPoints" type="number" inputmode="numeric" min="1" max="9999" value="5" />
          </div>
        </div>
        <div class="toolbar">
          <button type="button" class="btn btn-good" id="addGoodTemplate">保存为常用项</button>
          <button type="button" class="btn btn-ghost" id="applyGoodOnce">直接加分</button>
        </div>
      </div>
      <div class="section-title">常用加分项（点一下即加分）</div>
      <div class="chip-list" id="goodList"></div>
    </section>

    <section id="panel-bad" class="panel" role="tabpanel" hidden>
      <div class="section-title">记一件需要反省的事</div>
      <div class="card">
        <div class="row">
          <div class="field">
            <label for="badName">事情描述</label>
            <input id="badName" type="text" placeholder="例如：说话冲、忘记约定" maxlength="80" />
          </div>
          <div class="field" style="flex: 0 0 88px; min-width: 88px;">
            <label for="badPoints">扣分</label>
            <input id="badPoints" type="number" inputmode="numeric" min="1" max="9999" value="3" />
          </div>
        </div>
        <div class="toolbar">
          <button type="button" class="btn btn-bad" id="addBadTemplate">保存为常用项</button>
          <button type="button" class="btn btn-ghost" id="applyBadOnce">直接扣分</button>
        </div>
      </div>
      <div class="section-title">常用扣分项（点一下即扣分）</div>
      <div class="chip-list" id="badList"></div>
    </section>

    <section id="panel-redeem" class="panel" role="tabpanel" hidden>
      <div class="section-title">可兑换的奖励</div>
      <div class="card">
        <div class="row">
          <div class="field">
            <label for="rewardName">奖励内容</label>
            <input id="rewardName" type="text" placeholder="例如：一顿想吃的饭、免做家务一天" maxlength="80" />
          </div>
          <div class="field" style="flex: 0 0 88px; min-width: 88px;">
            <label for="rewardCost">所需积分</label>
            <input id="rewardCost" type="number" inputmode="numeric" min="1" max="99999" value="30" />
          </div>
        </div>
        <div class="toolbar">
          <button type="button" class="btn btn-gold" id="addReward">添加兑换项</button>
        </div>
      </div>
      <div class="section-title">点击兑换（扣除当前所选一方的积分）</div>
      <div class="chip-list" id="rewardList"></div>
    </section>

    <section id="panel-history" class="panel" role="tabpanel" hidden>
      <div class="section-title">最近记录</div>
      <div class="card" id="historyCard">
        <div id="historyList"></div>
        <div class="toolbar" style="margin-top: 8px;">
          <button type="button" class="btn btn-ghost btn-sm" id="clearHistory">清空记录（保留积分与模板）</button>
        </div>
      </div>
      <div class="section-title" style="margin-top: 22px;">备份与恢复</div>
      <div class="card">
        <p class="help-text">导出 JSON 后自行保存或发给对方；换手机时用「从文件恢复」载入。数据只在本机浏览器，不会上传服务器。</p>
        <div class="toolbar">
          <button type="button" class="btn btn-gold" id="exportData">导出备份</button>
          <button type="button" class="btn btn-ghost" id="triggerImport">从文件恢复</button>
        </div>
        <input type="file" id="importFile" accept="application/json,.json" hidden />
        <div class="toolbar" style="margin-top: 4px;">
          <button type="button" class="btn btn-bad btn-sm" id="resetAll">清空全部数据</button>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <div class="modal-overlay" id="confirmModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <h3 id="confirmTitle">确认操作</h3>
      <p id="confirmBody" style="color: var(--muted); font-size: 0.9rem;"></p>
      <div class="actions">
        <button type="button" class="btn btn-ghost" id="confirmCancel">取消</button>
        <button type="button" class="btn btn-gold" id="confirmOk">确定</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "coupleRewardsApp.v1";

    const defaultState = () => ({
      nameHusband: "老公",
      nameWife: "老婆",
      balanceHusband: 0,
      balanceWife: 0,
      activePerson: "husband",
      goodTemplates: [
        { id: uid(), name: "主动分担家务", points: 5 },
        { id: uid(), name: "认真倾听、好好沟通", points: 8 },
      ],
      badTemplates: [
        { id: uid(), name: "说话伤人/冷战", points: 5 },
        { id: uid(), name: "忘记重要约定", points: 8 },
      ],
      rewards: [
        { id: uid(), name: "对方请吃一顿想吃的", cost: 40 },
        { id: uid(), name: "按摩 20 分钟", cost: 25 },
      ],
      history: [],
    });

    function uid() {
      return crypto.randomUUID?.() || String(Date.now()) + Math.random().toString(36).slice(2);
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const data = JSON.parse(raw);
        const def = defaultState();
        let balanceHusband = Number(data.balanceHusband);
        let balanceWife = Number(data.balanceWife);
        if (!Number.isFinite(balanceHusband)) balanceHusband = 0;
        if (!Number.isFinite(balanceWife)) balanceWife = 0;
        if (
          data.balance != null &&
          data.balanceHusband == null &&
          data.balanceWife == null
        ) {
          balanceHusband = Number(data.balance) || 0;
          balanceWife = 0;
        }
        const activePerson =
          data.activePerson === "wife" || data.activePerson === "husband"
            ? data.activePerson
            : "husband";
        return {
          nameHusband:
            typeof data.nameHusband === "string" && data.nameHusband.trim()
              ? data.nameHusband.trim().slice(0, 8)
              : def.nameHusband,
          nameWife:
            typeof data.nameWife === "string" && data.nameWife.trim()
              ? data.nameWife.trim().slice(0, 8)
              : def.nameWife,
          balanceHusband,
          balanceWife,
          activePerson,
          goodTemplates: Array.isArray(data.goodTemplates) ? data.goodTemplates : def.goodTemplates,
          badTemplates: Array.isArray(data.badTemplates) ? data.badTemplates : def.badTemplates,
          rewards: Array.isArray(data.rewards) ? data.rewards : def.rewards,
          history: Array.isArray(data.history) ? data.history : [],
        };
      } catch {
        return defaultState();
      }
    }

    let state = loadState();

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function normalizeImportedPayload(raw) {
      const data =
        raw && typeof raw === "object" && raw.data && typeof raw.data === "object" ? raw.data : raw;
      if (!data || typeof data !== "object") return null;
      const def = defaultState();

      const mapGoodBad = (arr, fallbackPts) => {
        if (!Array.isArray(arr)) return null;
        return arr
          .filter((t) => t && String(t.name).trim())
          .map((t) => ({
            id: t.id || uid(),
            name: String(t.name).trim(),
            points: Math.max(1, Math.min(99999, parseInt(String(t.points), 10) || fallbackPts)),
          }));
      };

      const mapRewards = (arr) => {
        if (!Array.isArray(arr)) return null;
        return arr
          .filter((r) => r && String(r.name).trim())
          .map((r) => ({
            id: r.id || uid(),
            name: String(r.name).trim(),
            cost: Math.max(1, Math.min(99999, parseInt(String(r.cost), 10) || 30)),
          }));
      };

      const mapHistory = (arr) => {
        if (!Array.isArray(arr)) return [];
        return arr
          .filter((h) => h && String(h.title || "").trim())
          .map((h) => {
            const kind =
              h.kind === "good" || h.kind === "bad" || h.kind === "redeem" ? h.kind : "good";
            const person =
              h.person === "wife" || h.person === "husband" ? h.person : "husband";
            const base = {
              id: h.id || uid(),
              at: typeof h.at === "string" ? h.at : new Date().toISOString(),
              kind,
              title: String(h.title).trim(),
              person,
            };
            if (kind === "redeem") return { ...base, cost: Math.max(0, Number(h.cost) || 0) };
            return { ...base, points: Math.max(1, Number(h.points) || 1) };
          })
          .slice(0, 200);
      };

      let balanceHusband = Number(data.balanceHusband);
      let balanceWife = Number(data.balanceWife);
      if (!Number.isFinite(balanceHusband)) balanceHusband = 0;
      if (!Number.isFinite(balanceWife)) balanceWife = 0;
      if (
        data.balance != null &&
        data.balanceHusband == null &&
        data.balanceWife == null
      ) {
        balanceHusband = Number(data.balance) || 0;
        balanceWife = 0;
      }
      const activePerson =
        data.activePerson === "wife" || data.activePerson === "husband"
          ? data.activePerson
          : "husband";

      return {
        nameHusband:
          typeof data.nameHusband === "string" && data.nameHusband.trim()
            ? data.nameHusband.trim().slice(0, 8)
            : def.nameHusband,
        nameWife:
          typeof data.nameWife === "string" && data.nameWife.trim()
            ? data.nameWife.trim().slice(0, 8)
            : def.nameWife,
        balanceHusband,
        balanceWife,
        activePerson,
        goodTemplates: mapGoodBad(data.goodTemplates, 5) ?? def.goodTemplates,
        badTemplates: mapGoodBad(data.badTemplates, 3) ?? def.badTemplates,
        rewards: mapRewards(data.rewards) ?? def.rewards,
        history: mapHistory(data.history),
      };
    }

    const els = {
      balanceHusband: document.getElementById("balanceHusband"),
      balanceWife: document.getElementById("balanceWife"),
      labelHusband: document.getElementById("labelHusband"),
      labelWife: document.getElementById("labelWife"),
      nameHusbandInput: document.getElementById("nameHusbandInput"),
      nameWifeInput: document.getElementById("nameWifeInput"),
      pickHusband: document.getElementById("pickHusband"),
      pickWife: document.getElementById("pickWife"),
      whoHint: document.getElementById("whoHint"),
      balanceHint: document.getElementById("balanceHint"),
      goodName: document.getElementById("goodName"),
      goodPoints: document.getElementById("goodPoints"),
      badName: document.getElementById("badName"),
      badPoints: document.getElementById("badPoints"),
      rewardName: document.getElementById("rewardName"),
      rewardCost: document.getElementById("rewardCost"),
      goodList: document.getElementById("goodList"),
      badList: document.getElementById("badList"),
      rewardList: document.getElementById("rewardList"),
      historyList: document.getElementById("historyList"),
      toast: document.getElementById("toast"),
      confirmModal: document.getElementById("confirmModal"),
      confirmBody: document.getElementById("confirmBody"),
      confirmOk: document.getElementById("confirmOk"),
      confirmCancel: document.getElementById("confirmCancel"),
    };

    function toast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => els.toast.classList.remove("show"), 2200);
    }

    let confirmResolver = null;
    function confirm(message) {
      return new Promise((resolve) => {
        confirmResolver = resolve;
        els.confirmBody.textContent = message;
        els.confirmModal.classList.add("open");
        els.confirmModal.setAttribute("aria-hidden", "false");
      });
    }

    function closeConfirm(result) {
      els.confirmModal.classList.remove("open");
      els.confirmModal.setAttribute("aria-hidden", "true");
      if (confirmResolver) confirmResolver(result);
      confirmResolver = null;
    }

    els.confirmOk.addEventListener("click", () => closeConfirm(true));
    els.confirmCancel.addEventListener("click", () => closeConfirm(false));
    els.confirmModal.addEventListener("click", (e) => {
      if (e.target === els.confirmModal) closeConfirm(false);
    });

    function formatTime(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      const now = new Date();
      const sameDay =
        d.getFullYear() === now.getFullYear() &&
        d.getMonth() === now.getMonth() &&
        d.getDate() === now.getDate();
      const t = d.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
      if (sameDay) return `今天 ${t}`;
      return d.toLocaleString("zh-CN", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function personLabel(person) {
      return person === "wife" ? state.nameWife : state.nameHusband;
    }

    function balanceOf(person) {
      return person === "wife" ? state.balanceWife : state.balanceHusband;
    }

    function addBalance(person, delta) {
      if (person === "wife") state.balanceWife += delta;
      else state.balanceHusband += delta;
    }

    function pushHistory(entry) {
      const person = entry.person === "wife" || entry.person === "husband" ? entry.person : state.activePerson;
      state.history.unshift({ id: uid(), at: new Date().toISOString(), ...entry, person });
      if (state.history.length > 200) state.history.length = 200;
    }

    function hintForPerson(person) {
      const b = balanceOf(person);
      const next = state.rewards
        .filter((r) => r.cost > b)
        .sort((a, c) => a.cost - c.cost)[0];
      const name = personLabel(person);
      if (next) return `${name} 离「${next.name}」还差 ${next.cost - b} 分`;
      if (state.rewards.length) return `${name} 可以去换奖励啦`;
      return `${name}：先加几条小奖励吧`;
    }

    function renderPersonUI() {
      els.labelHusband.textContent = state.nameHusband;
      els.labelWife.textContent = state.nameWife;
      els.pickHusband.textContent = state.nameHusband;
      els.pickWife.textContent = state.nameWife;
      els.pickHusband.classList.toggle("active", state.activePerson === "husband");
      els.pickWife.classList.toggle("active", state.activePerson === "wife");
      els.pickHusband.setAttribute("aria-selected", state.activePerson === "husband" ? "true" : "false");
      els.pickWife.setAttribute("aria-selected", state.activePerson === "wife" ? "true" : "false");
      els.whoHint.textContent = `当前记在「${personLabel(state.activePerson)}」名下 · 点上面两个按钮切换～`;
      if (document.activeElement !== els.nameHusbandInput) {
        els.nameHusbandInput.value = state.nameHusband;
      }
      if (document.activeElement !== els.nameWifeInput) {
        els.nameWifeInput.value = state.nameWife;
      }
    }

    function renderBalance() {
      els.balanceHusband.textContent = state.balanceHusband;
      els.balanceWife.textContent = state.balanceWife;
      const h = hintForPerson("husband");
      const w = hintForPerson("wife");
      if (!state.rewards.length) {
        els.balanceHint.textContent = "先一起加几条想吃想玩的小奖励吧～";
      } else {
        els.balanceHint.textContent = `${h} · ${w}`;
      }
    }

    function renderGoodList() {
      if (!state.goodTemplates.length) {
        els.goodList.innerHTML = '<div class="empty">还没有常用项，填写上方表单后点「保存为常用项」</div>';
        return;
      }
      els.goodList.innerHTML = state.goodTemplates
        .map(
          (t) => `
        <div class="chip chip-good">
          <button type="button" class="chip-trigger" data-action="apply-good" data-id="${t.id}">
            <span style="min-width:0;word-break:break-word;">${escapeHtml(t.name)}</span>
            <span class="points">+${t.points}</span>
          </button>
          <div class="chip-actions">
            <button type="button" class="btn btn-ghost btn-sm" data-action="del-good" data-id="${t.id}">删除</button>
          </div>
        </div>`
        )
        .join("");
    }

    function renderBadList() {
      if (!state.badTemplates.length) {
        els.badList.innerHTML = '<div class="empty">还没有常用扣分项</div>';
        return;
      }
      els.badList.innerHTML = state.badTemplates
        .map(
          (t) => `
        <div class="chip chip-bad">
          <button type="button" class="chip-trigger" data-action="apply-bad" data-id="${t.id}">
            <span style="min-width:0;word-break:break-word;">${escapeHtml(t.name)}</span>
            <span class="points">−${t.points}</span>
          </button>
          <div class="chip-actions">
            <button type="button" class="btn btn-ghost btn-sm" data-action="del-bad" data-id="${t.id}">删除</button>
          </div>
        </div>`
        )
        .join("");
    }

    function renderRewardList() {
      if (!state.rewards.length) {
        els.rewardList.innerHTML = '<div class="empty">添加奖励后，攒够积分即可兑换</div>';
        return;
      }
      els.rewardList.innerHTML = state.rewards
        .map(
          (r) => {
            const ok = balanceOf(state.activePerson) >= r.cost;
            return `
        <div class="chip chip-gold">
          <button type="button" class="chip-trigger" data-action="redeem" data-id="${r.id}" ${ok ? "" : "disabled"} aria-disabled="${ok ? "false" : "true"}">
            <span style="min-width:0;word-break:break-word;">${escapeHtml(r.name)}</span>
            <span class="points">${r.cost} 分</span>
          </button>
          <div class="chip-actions">
            <button type="button" class="btn btn-ghost btn-sm" data-action="del-reward" data-id="${r.id}">删除</button>
          </div>
        </div>`;
          }
        )
        .join("");
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function renderHistory() {
      if (!state.history.length) {
        els.historyList.innerHTML = '<div class="empty">暂无记录</div>';
        return;
      }
      els.historyList.innerHTML = state.history
        .map((h) => {
          let deltaClass = "";
          let deltaText = "";
          if (h.kind === "good") {
            deltaClass = "plus";
            deltaText = `+${h.points}`;
          } else if (h.kind === "bad") {
            deltaClass = "minus";
            deltaText = `−${h.points}`;
          } else {
            deltaClass = "redeem";
            deltaText = `−${h.cost}`;
          }
          const p = h.person === "wife" || h.person === "husband" ? h.person : "husband";
          const tag = escapeHtml(personLabel(p));
          return `
          <div class="history-item">
            <div>
              <div class="title-line"><span class="who-tag">${tag}</span>${escapeHtml(h.title)}</div>
              <div class="meta">${formatTime(h.at)}</div>
            </div>
            <div class="delta ${deltaClass}">${deltaText}</div>
          </div>`;
        })
        .join("");
    }

    function renderAll() {
      renderPersonUI();
      renderBalance();
      renderGoodList();
      renderBadList();
      renderRewardList();
      renderHistory();
      saveState();
    }

    function setActivePerson(person) {
      state.activePerson = person === "wife" ? "wife" : "husband";
      renderAll();
    }

    els.pickHusband.addEventListener("click", () => setActivePerson("husband"));
    els.pickWife.addEventListener("click", () => setActivePerson("wife"));

    function syncNameFromInputs() {
      state.nameHusband = (els.nameHusbandInput.value || "老公").trim().slice(0, 8) || "老公";
      state.nameWife = (els.nameWifeInput.value || "老婆").trim().slice(0, 8) || "老婆";
    }

    els.nameHusbandInput.addEventListener("input", () => {
      syncNameFromInputs();
      els.labelHusband.textContent = state.nameHusband;
      els.pickHusband.textContent = state.nameHusband;
      els.whoHint.textContent = `当前记在「${personLabel(state.activePerson)}」名下 · 点上面两个按钮切换～`;
      saveState();
    });
    els.nameWifeInput.addEventListener("input", () => {
      syncNameFromInputs();
      els.labelWife.textContent = state.nameWife;
      els.pickWife.textContent = state.nameWife;
      els.whoHint.textContent = `当前记在「${personLabel(state.activePerson)}」名下 · 点上面两个按钮切换～`;
      saveState();
    });

    document.querySelectorAll(".tabs button").forEach((btn) => {
      btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll(".tabs button").forEach((b) => {
          b.classList.toggle("active", b === btn);
          b.setAttribute("aria-selected", b === btn ? "true" : "false");
        });
        document.querySelectorAll(".panel").forEach((p) => {
          const id = "panel-" + tab;
          const on = p.id === id;
          p.classList.toggle("active", on);
          p.hidden = !on;
        });
      });
    });

    function parsePositiveInt(input, fallback) {
      const n = parseInt(String(input).trim(), 10);
      if (!Number.isFinite(n) || n < 1) return fallback;
      return Math.min(n, 99999);
    }

    document.getElementById("addGoodTemplate").addEventListener("click", () => {
      const name = els.goodName.value.trim();
      const points = parsePositiveInt(els.goodPoints.value, 5);
      if (!name) {
        toast("请填写事情描述");
        return;
      }
      state.goodTemplates.push({ id: uid(), name, points });
      els.goodName.value = "";
      toast("已保存常用加分项");
      renderAll();
    });

    document.getElementById("applyGoodOnce").addEventListener("click", () => {
      const name = els.goodName.value.trim();
      const points = parsePositiveInt(els.goodPoints.value, 5);
      if (!name) {
        toast("请填写事情描述");
        return;
      }
      addBalance(state.activePerson, points);
      pushHistory({ kind: "good", title: name, points, person: state.activePerson });
      els.goodName.value = "";
      toast(`已为「${personLabel(state.activePerson)}」加分 +${points}`);
      renderAll();
    });

    document.getElementById("addBadTemplate").addEventListener("click", () => {
      const name = els.badName.value.trim();
      const points = parsePositiveInt(els.badPoints.value, 3);
      if (!name) {
        toast("请填写事情描述");
        return;
      }
      state.badTemplates.push({ id: uid(), name, points });
      els.badName.value = "";
      toast("已保存常用扣分项");
      renderAll();
    });

    document.getElementById("applyBadOnce").addEventListener("click", () => {
      const name = els.badName.value.trim();
      const points = parsePositiveInt(els.badPoints.value, 3);
      if (!name) {
        toast("请填写事情描述");
        return;
      }
      addBalance(state.activePerson, -points);
      pushHistory({ kind: "bad", title: name, points, person: state.activePerson });
      els.badName.value = "";
      toast(`已为「${personLabel(state.activePerson)}」扣分 −${points}`);
      renderAll();
    });

    document.getElementById("addReward").addEventListener("click", () => {
      const name = els.rewardName.value.trim();
      const cost = parsePositiveInt(els.rewardCost.value, 30);
      if (!name) {
        toast("请填写奖励内容");
        return;
      }
      state.rewards.push({ id: uid(), name, cost });
      els.rewardName.value = "";
      toast("已添加兑换项");
      renderAll();
    });

    document.getElementById("goodList").addEventListener("click", (e) => {
      const t = e.target.closest("[data-action]");
      if (!t) return;
      const id = t.dataset.id;
      if (t.dataset.action === "apply-good") {
        const item = state.goodTemplates.find((x) => x.id === id);
        if (!item) return;
        addBalance(state.activePerson, item.points);
        pushHistory({
          kind: "good",
          title: item.name,
          points: item.points,
          person: state.activePerson,
        });
        toast(`「${personLabel(state.activePerson)}」+${item.points} ${item.name}`);
        renderAll();
      }
      if (t.dataset.action === "del-good") {
        state.goodTemplates = state.goodTemplates.filter((x) => x.id !== id);
        renderAll();
      }
    });

    document.getElementById("badList").addEventListener("click", (e) => {
      const t = e.target.closest("[data-action]");
      if (!t) return;
      const id = t.dataset.id;
      if (t.dataset.action === "apply-bad") {
        const item = state.badTemplates.find((x) => x.id === id);
        if (!item) return;
        addBalance(state.activePerson, -item.points);
        pushHistory({
          kind: "bad",
          title: item.name,
          points: item.points,
          person: state.activePerson,
        });
        toast(`「${personLabel(state.activePerson)}」−${item.points} ${item.name}`);
        renderAll();
      }
      if (t.dataset.action === "del-bad") {
        state.badTemplates = state.badTemplates.filter((x) => x.id !== id);
        renderAll();
      }
    });

    document.getElementById("rewardList").addEventListener("click", async (e) => {
      const t = e.target.closest("[data-action]");
      if (!t) return;
      const id = t.dataset.id;
      if (t.dataset.action === "redeem") {
        const item = state.rewards.find((x) => x.id === id);
        if (!item || balanceOf(state.activePerson) < item.cost) return;
        const who = personLabel(state.activePerson);
        const ok = await confirm(
          `确定用「${who}」的 ${item.cost} 分兑换「${item.name}」吗？`
        );
        if (!ok) return;
        addBalance(state.activePerson, -item.cost);
        pushHistory({
          kind: "redeem",
          title: `兑换：${item.name}`,
          cost: item.cost,
          person: state.activePerson,
        });
        toast("兑换成功，记得兑现哦～");
        renderAll();
      }
      if (t.dataset.action === "del-reward") {
        state.rewards = state.rewards.filter((x) => x.id !== id);
        renderAll();
      }
    });

    document.getElementById("clearHistory").addEventListener("click", async () => {
      const ok = await confirm("清空所有历史记录？当前积分与模板不会变。");
      if (!ok) return;
      state.history = [];
      toast("已清空记录");
      renderAll();
    });

    document.getElementById("exportData").addEventListener("click", () => {
      const payload = {
        version: 1,
        exportedAt: new Date().toISOString(),
        data: {
          nameHusband: state.nameHusband,
          nameWife: state.nameWife,
          balanceHusband: state.balanceHusband,
          balanceWife: state.balanceWife,
          activePerson: state.activePerson,
          goodTemplates: state.goodTemplates,
          badTemplates: state.badTemplates,
          rewards: state.rewards,
          history: state.history,
        },
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      const day = new Date().toISOString().slice(0, 10);
      a.href = URL.createObjectURL(blob);
      a.download = `couple-rewards-backup-${day}.json`;
      a.rel = "noopener";
      a.click();
      URL.revokeObjectURL(a.href);
      toast("已导出备份");
    });

    document.getElementById("triggerImport").addEventListener("click", () => {
      document.getElementById("importFile").click();
    });

    document.getElementById("importFile").addEventListener("change", async (e) => {
      const input = e.target;
      const file = input.files && input.files[0];
      input.value = "";
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const next = normalizeImportedPayload(parsed);
        if (!next) {
          toast("文件格式不对");
          return;
        }
        const ok = await confirm("用备份覆盖当前积分、模板、奖励与历史记录？此操作不可撤销。");
        if (!ok) return;
        state = next;
        toast("已从备份恢复");
        renderAll();
      } catch {
        toast("无法读取该文件");
      }
    });

    document.getElementById("resetAll").addEventListener("click", async () => {
      const ok = await confirm("将删除积分、模板、奖励与记录，恢复到初始示例数据。确定？");
      if (!ok) return;
      state = defaultState();
      toast("已恢复初始状态");
      renderAll();
    });

    if ("serviceWorker" in navigator) {
      const { protocol, hostname } = location;
      const local =
        hostname === "localhost" || hostname === "127.0.0.1" || hostname === "[::1]";
      if (protocol === "https:" || local) {
        navigator.serviceWorker
          .register("./sw.js", { scope: "./" })
          .then((reg) => reg.update())
          .catch(() => {});
      }
    }

    renderAll();
  </script>
</body>
</html>
